<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Flasche bitte – Kampfsimulator</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 16px;
      background: #f7f7f7;
    }

    h1 {
      text-align: center;
    }

    .fighters {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 20px;
    }

    .card {
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
      box-sizing: border-box;
    }

    button {
      margin-top: 12px;
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #222;
      color: white;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #444;
    }

    .actions {
      text-align: center;
    }

    #result, #log, #info {
      margin-top: 24px;
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    #log {
      white-space: pre-line;
      max-height: 450px;
      overflow-y: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      font-size: 14px;
    }

    .winner {
      font-weight: bold;
      font-size: 20px;
      color: darkgreen;
    }

    .formula {
      text-align: center;
      line-height: 1.6;
      margin-bottom: 20px;
    }

    .sim-card {
      max-width: 300px;
      margin: 20px auto;
      background: white;
      padding: 16px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }

    .suggestion {
      margin-top: 14px;
      padding: 12px;
      border-radius: 10px;
      background: #f2f2f2;
      font-size: 14px;
      line-height: 1.45;
    }

    .suggestion strong {
      font-size: 15px;
    }

    @media (max-width: 900px) {
      .fighters {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <h1>Kampfsimulator</h1>

  <div class="formula">
    <div><strong>Schaden = round(A × 15 / (15 + D))</strong></div>
    <div><strong>Ausweichchance = E / (E + 270)</strong></div>
    <div><strong>Speed:</strong> Höherer Wert greift zuerst an. Bei Gleichstand Spieler 1.</div>
  </div>

  <div class="fighters">
    <div class="card">
      <h2>Spieler 1</h2>

      <label>
        Health
        <input id="hp1" type="number" value="100" min="1">
      </label>

      <label>
        Angriff
        <input id="atk1" type="number" value="20" min="0">
      </label>

      <label>
        Verteidigung
        <input id="def1" type="number" value="10" min="0">
      </label>

      <label>
        Ausweichen
        <input id="eva1" type="number" value="23" min="0">
      </label>

      <label>
        Speed
        <input id="spd1" type="number" value="10" min="0">
      </label>
    </div>

    <div class="card">
      <h2>Spieler 2 / Gegner</h2>

      <label>
        Health
        <input id="hp2" type="number" value="100" min="1">
      </label>

      <label>
        Angriff
        <input id="atk2" type="number" value="20" min="0">
      </label>

      <label>
        Verteidigung
        <input id="def2" type="number" value="10" min="0">
      </label>

      <label>
        Ausweichen
        <input id="eva2" type="number" value="23" min="0">
      </label>

      <label>
        Speed
        <input id="spd2" type="number" value="10" min="0">
      </label>
    </div>

    <div class="card">
      <h2>Minimal viable Flasche</h2>

      <label>
        Ziel-Gewinnchance in %
        <input id="targetWinRate" type="number" value="80" min="1" max="100">
      </label>

      <label>
        Simulationen pro Vorschlag
        <input id="suggestionSims" type="number" value="1000" min="100">
      </label>

      <button onclick="calculateSuggestions()">Vorschläge berechnen</button>

      <div id="suggestions">
        Noch keine Vorschläge berechnet.
      </div>
    </div>
  </div>

  <div class="sim-card">
    <label>
      Anzahl Simulationen
      <input id="numSims" type="number" value="10000" min="1">
    </label>
  </div>

  <div class="actions">
    <button onclick="simulateOneFightAndShowLog()">Einzelkampf simulieren</button>
    <button onclick="simulateManyFights()">n Kämpfe simulieren</button>
  </div>

  <div id="info"></div>
  <div id="result"></div>
  <div id="log"></div>

  <script>
    function damage(attack, defense) {
      return Math.round(attack * 15 / (15 + defense));
    }

    function dodgeChance(evasion) {
      return evasion / (evasion + 270);
    }

    function percent(x) {
      return (100 * x).toFixed(2) + "%";
    }

    function getNumber(id) {
      return Number(document.getElementById(id).value);
    }

    function setNumber(id, value) {
      document.getElementById(id).value = value;
    }

    function readFighters() {
      const p1 = {
        name: "Spieler 1",
        hp: getNumber("hp1"),
        maxHp: getNumber("hp1"),
        atk: getNumber("atk1"),
        def: getNumber("def1"),
        eva: getNumber("eva1"),
        spd: getNumber("spd1")
      };

      const p2 = {
        name: "Gegner",
        hp: getNumber("hp2"),
        maxHp: getNumber("hp2"),
        atk: getNumber("atk2"),
        def: getNumber("def2"),
        eva: getNumber("eva2"),
        spd: getNumber("spd2")
      };

      return { p1, p2 };
    }

    function cloneFighter(f) {
      return {
        name: f.name,
        hp: f.maxHp,
        maxHp: f.maxHp,
        atk: f.atk,
        def: f.def,
        eva: f.eva,
        spd: f.spd
      };
    }

    function attack(attacker, defender, roundLabel, withLog) {
      const chance = dodgeChance(defender.eva);

      if (Math.random() < chance) {
        return {
          damage: 0,
          dodged: true,
          text: withLog
            ? `${roundLabel}: ${attacker.name} greift an, aber ${defender.name} weicht aus.`
            : ""
        };
      }

      const dmg = damage(attacker.atk, defender.def);
      defender.hp -= dmg;
      if (defender.hp < 0) defender.hp = 0;

      return {
        damage: dmg,
        dodged: false,
        text: withLog
          ? `${roundLabel}: ${attacker.name} greift an und macht ${dmg} Schaden. ${defender.name} hat noch ${defender.hp} HP.`
          : ""
      };
    }

    function simulateFight(baseP1, baseP2, withLog = false) {
      const p1 = cloneFighter(baseP1);
      const p2 = cloneFighter(baseP2);

      let first, second;

      if (p1.spd >= p2.spd) {
        first = p1;
        second = p2;
      } else {
        first = p2;
        second = p1;
      }

      let round = 1;
      let log = "";

      while (p1.hp > 0 && p2.hp > 0 && round <= 1000) {
        const result1 = attack(first, second, `Runde ${round}`, withLog);
        if (withLog) log += result1.text + "\n";

        if (second.hp <= 0) break;

        const result2 = attack(second, first, `Runde ${round}`, withLog);
        if (withLog) log += result2.text + "\n\n";

        round++;
      }

      let winner = "draw";

      if (p1.hp > 0 && p2.hp <= 0) {
        winner = "p1";
      } else if (p2.hp > 0 && p1.hp <= 0) {
        winner = "p2";
      }

      return {
        winner,
        p1Hp: p1.hp,
        p2Hp: p2.hp,
        rounds: round,
        log
      };
    }

    function estimateWinRate(p1, p2, n) {
      let p1Wins = 0;
      let p2Wins = 0;
      let draws = 0;
      let totalRounds = 0;

      for (let i = 0; i < n; i++) {
        const result = simulateFight(p1, p2, false);

        if (result.winner === "p1") {
          p1Wins++;
        } else if (result.winner === "p2") {
          p2Wins++;
        } else {
          draws++;
        }

        totalRounds += result.rounds;
      }

      return {
        p1Wins,
        p2Wins,
        draws,
        winRate: p1Wins / n,
        avgRounds: totalRounds / n
      };
    }

    function showInfo(p1, p2) {
      const dmg1to2 = damage(p1.atk, p2.def);
      const dmg2to1 = damage(p2.atk, p1.def);
      const eva1 = dodgeChance(p1.eva);
      const eva2 = dodgeChance(p2.eva);

      let firstName = p1.spd >= p2.spd ? "Spieler 1" : "Gegner";

      document.getElementById("info").innerHTML = `
        <strong>Kampfwerte:</strong><br>
        Spieler 1 macht ${dmg1to2} Schaden, falls der Gegner nicht ausweicht.<br>
        Gegner macht ${dmg2to1} Schaden, falls Spieler 1 nicht ausweicht.<br>
        Spieler 1 Ausweichchance: ${percent(eva1)}<br>
        Gegner Ausweichchance: ${percent(eva2)}<br>
        Erster Angriff: ${firstName}
      `;
    }

    function simulateOneFightAndShowLog() {
      const { p1, p2 } = readFighters();
      showInfo(p1, p2);

      const result = simulateFight(p1, p2, true);

      let resultText = "";

      if (result.winner === "p1") {
        resultText = `<div class="winner">Spieler 1 gewinnt!</div>`;
      } else if (result.winner === "p2") {
        resultText = `<div class="winner">Gegner gewinnt!</div>`;
      } else {
        resultText = `<div class="winner">Unentschieden oder Kampf abgebrochen.</div>`;
      }

      resultText += `
        <p>
          Endstand:<br>
          Spieler 1: ${result.p1Hp} / ${p1.maxHp} HP<br>
          Gegner: ${result.p2Hp} / ${p2.maxHp} HP<br>
          Runden: ${result.rounds}
        </p>
      `;

      document.getElementById("result").innerHTML = resultText;
      document.getElementById("log").textContent = result.log;
    }

    function simulateManyFights() {
      const { p1, p2 } = readFighters();
      showInfo(p1, p2);

      const n = Math.max(1, Math.floor(getNumber("numSims")));
      const stats = estimateWinRate(p1, p2, n);

      document.getElementById("result").innerHTML = `
        <div class="winner">Simulation abgeschlossen</div>
        <p>
          Anzahl Kämpfe: ${n}<br><br>

          <strong>Gewinnwahrscheinlichkeit:</strong><br>
          Spieler 1: ${percent(stats.winRate)} (${stats.p1Wins} Siege)<br>
          Gegner: ${percent(stats.p2Wins / n)} (${stats.p2Wins} Siege)<br>
          Unentschieden/Abbruch: ${percent(stats.draws / n)} (${stats.draws})<br><br>

          Durchschnittliche Rundenzahl: ${stats.avgRounds.toFixed(2)}
        </p>
      `;

      document.getElementById("log").textContent =
        "Für Mehrfachsimulationen wird kein Kampflog ausgegeben. Nutze „Einzelkampf simulieren“ für ein detailliertes Log.";
    }

    function scoreBottle(p) {
      // Grober Minimalitäts-Score.
      // HP ist meist größer skaliert, daher zählt 10 HP ungefähr wie 1 Statpunkt.
      return p.atk + p.def + p.eva + p.spd + p.maxHp / 10;
    }

    function bottleToHtml(title, p, stats, idPrefix) {
      return `
        <div class="suggestion">
          <strong>${title}</strong><br>
          HP: ${p.maxHp}<br>
          Angriff: ${p.atk}<br>
          Verteidigung: ${p.def}<br>
          Ausweichen: ${p.eva}<br>
          Speed: ${p.spd}<br>
          Gewinnchance: ${percent(stats.winRate)}<br>
          Ø Runden: ${stats.avgRounds.toFixed(2)}<br>
          Score: ${scoreBottle(p).toFixed(1)}<br>
          <button onclick="applySuggestion('${idPrefix}')">Übernehmen</button>
        </div>
      `;
    }

    const savedSuggestions = {};

    function applySuggestion(id) {
      const p = savedSuggestions[id];
      if (!p) return;

      setNumber("hp1", p.maxHp);
      setNumber("atk1", p.atk);
      setNumber("def1", p.def);
      setNumber("eva1", p.eva);
      setNumber("spd1", p.spd);

      const { p1, p2 } = readFighters();
      showInfo(p1, p2);
    }

    function calculateSuggestions() {
      const { p1, p2 } = readFighters();

      const target = Math.max(0.01, Math.min(1, getNumber("targetWinRate") / 100));
      const sims = Math.max(100, Math.floor(getNumber("suggestionSims")));

      const base = {
        name: "Spieler 1",
        hp: p1.maxHp,
        maxHp: p1.maxHp,
        atk: p1.atk,
        def: p1.def,
        eva: p1.eva,
        spd: Math.max(p1.spd, p2.spd + 1)
      };

      const suggestions = [];

      // Angriff-Build:
      // HP/Def/Ausweichen bleiben wie bei Spieler 1, Speed wird so gesetzt,
      // dass man anfängt, Angriff wird erhöht.
      let bestAttack = null;
      for (let atk = Math.max(1, base.atk); atk <= 1000; atk++) {
        const candidate = {
          ...base,
          atk,
          hp: base.maxHp,
          maxHp: base.maxHp
        };

        const stats = estimateWinRate(candidate, p2, sims);

        if (stats.winRate >= target) {
          bestAttack = { p: candidate, stats };
          break;
        }
      }

      if (bestAttack) {
        suggestions.push({
          id: "attack",
          title: "Angriff-Flasche",
          p: bestAttack.p,
          stats: bestAttack.stats
        });
      }

      // Defense-Build:
      // HP/Angriff/Ausweichen bleiben wie bei Spieler 1, Speed wird so gesetzt,
      // dass man anfängt, Verteidigung wird erhöht.
      let bestDefense = null;
      for (let def = Math.max(0, base.def); def <= 1000; def++) {
        const candidate = {
          ...base,
          def,
          hp: base.maxHp,
          maxHp: base.maxHp
        };

        const stats = estimateWinRate(candidate, p2, sims);

        if (stats.winRate >= target) {
          bestDefense = { p: candidate, stats };
          break;
        }
      }

      if (bestDefense) {
        suggestions.push({
          id: "defense",
          title: "Defense-Flasche",
          p: bestDefense.p,
          stats: bestDefense.stats
        });
      }

      // Balanced-Build:
      // Erhöht HP, Angriff und Verteidigung gemeinsam.
      // HP steigt in 5er-Schritten, Angriff und Defense in 1er-Schritten.
      let bestBalanced = null;
      for (let s = 0; s <= 1000; s++) {
        const candidate = {
          ...base,
          maxHp: base.maxHp + 5 * s,
          hp: base.maxHp + 5 * s,
          atk: base.atk + s,
          def: base.def + s
        };

        const stats = estimateWinRate(candidate, p2, sims);

        if (stats.winRate >= target) {
          bestBalanced = { p: candidate, stats };
          break;
        }
      }

      if (bestBalanced) {
        suggestions.push({
          id: "balanced",
          title: "Balanced-Flasche",
          p: bestBalanced.p,
          stats: bestBalanced.stats
        });
      }

      let html = "";

      if (suggestions.length === 0) {
        html = `
          <p>
            Keine passende Flasche gefunden.
            Erhöhe ggf. die aktuellen Grundwerte von Spieler 1 oder senke die Ziel-Gewinnchance.
          </p>
        `;
      } else {
        for (const s of suggestions) {
          savedSuggestions[s.id] = s.p;
          html += bottleToHtml(s.title, s.p, s.stats, s.id);
        }
      }

      document.getElementById("suggestions").innerHTML = html;
    }
  </script>
</body>
</html>
